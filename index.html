<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <link rel="stylesheet" href="index.css">
</head>
<body>

<header class="topbar">
  ← Terug
</header>

<div class="dashboard">

  <!-- Links -->
  <div class="tile physical">
    <h2>Fysieke staat</h2>
    <div class="silhouette">
      <!-- placeholder -->
    </div>
  </div>

  <!-- Midden boven -->
  <div class="tile growth">
    <h2>Totale groei</h2>
    <div class="growth-value">70%</div>
    <p>Sinds begin traject</p>
  </div>

  <!-- Rechts boven -->
  <div class="tile profile">
    <div class="profile-header">
      <div class="avatar"></div>
      <h3>Jan Jansen</h3>
    </div>
    <p>Geb. 03-08-1968</p>
    <p>CVA-datum: 12 okt, 2025</p>
    <p>Aangedaan: Links</p>
  </div>

  <!-- Midden onder -->
  <div class="tile satisfaction mood-tile">
    <h3>Tevredenheid</h3>
    <svg class="mood-image" viewBox="0 0 100 100"></svg>
    <div id="mood" class="score"></div>
  </div>

  <div class="tile energy mood-tile">
    <h3>Energieniveau</h3>
    <svg class="mood-image" viewBox="0 0 100 100"></svg>
    <div id="energy-level" class="score">5/10</div>
  </div>

  <div class="tile pain mood-tile">
    <h3>Pijnscore</h3>
    <svg class="mood-image" viewBox="0 0 100 100">
        <polygon points="44,3 10,53 44,53 28,97 90,38 56,38 72,3" fill="black" stroke="black" stroke-width="5" stroke-linejoin="round"/>
    </svg>
    <div id="pain-level" class="score">3/10</div>
  </div>

  <!-- Rechts onder -->
  <div class="tile exercises">
    <h3>Sessie Progressie</h3>
    <svg></svg>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
