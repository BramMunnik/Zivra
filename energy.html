<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="status.css">
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>

    <h2>Energie Analyse</h2>

    <div class="stats-grid">
        <div class="stat-card">
            <span class="stat-label">Huidig Energieniveau</span>
            <span id="current-energy" class="stat-value">-</span>
        </div>
        <div class="stat-card">
            <span class="stat-label">Verschil met vorige</span>
            <span id="energy-diff" class="stat-value">-</span>
        </div>
        <div class="stat-card">
            <span class="stat-label">Totaal verloop</span>
            <span id="energy-trend" class="stat-value">-</span>
        </div>
    </div>

    <div class="chart-section">
        <div class="chart-header">
            <h3>Energieniveau over de sessies</h3>
        </div>
        
        <div class="controls">
            <label class="checkbox-container energy-label">
                <input type="checkbox" id="toggle-energy" checked> Energie
            </label>
            <label class="checkbox-container mood-label">
                <input type="checkbox" id="toggle-mood"> Tevredenheid
            </label>
            <label class="checkbox-container pain-label">
                <input type="checkbox" id="toggle-pain"> Pijn
            </label>
        </div>

        <div id="energy-chart"></div>
    </div>

    <script src="iframes/energy.js"></script>
</body>
</html>
